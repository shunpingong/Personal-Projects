services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trust_system_api
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_SERVER: postgres
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: trust_system_postgres
    environment:
      POSTGRES_DB: trust_system
      POSTGRES_USER: trust_user
      POSTGRES_PASSWORD: trust_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust_user -d trust_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
