services:
  postgres:
    image: postgres:16-alpine
    container_name: local_chatbot_postgres
    environment:
      POSTGRES_DB: local_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d local_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_chatbot_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: local_chatbot_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/local_chatbot
      LANGGRAPH_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/local_chatbot?sslmode=disable
      QDRANT_URL: http://qdrant:6333
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: on-failure
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: local_chatbot_frontend
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  qdrant_data:
